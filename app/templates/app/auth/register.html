<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register | Liviel Tours Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172b 0%, #1a2333 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 2rem 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (min-width: 768px) {
            .auth-card {
                padding: 2.5rem 2rem;
            }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .brand-header {
                margin-bottom: 2rem;
            }
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #c45c26, #e8b86a);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
        }

        @media (min-width: 768px) {
            .brand-logo {
                width: 64px;
                height: 64px;
                border-radius: 20px;
                margin-bottom: 1rem;
            }
        }

        .brand-logo i {
            font-size: 1.75rem;
            color: white;
        }

        @media (min-width: 768px) {
            .brand-logo i {
                font-size: 2rem;
            }
        }

        .brand-header h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #0f172b, #c45c26);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @media (min-width: 768px) {
            .brand-header h2 {
                font-size: 1.75rem;
            }
        }

        .brand-header p {
            color: #64748b;
            font-size: 0.8125rem;
        }

        @media (min-width: 768px) {
            .brand-header p {
                font-size: 0.875rem;
            }
        }

        .form-group {
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .form-group {
                margin-bottom: 1.25rem;
            }
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8125rem;
            color: #1e293b;
            margin-bottom: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        @media (min-width: 768px) {
            .form-label {
                font-size: 0.875rem;
                margin-bottom: 0.5rem;
            }
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            z-index: 1;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.875rem;
            transition: all 0.2s;
            background: #fafcff;
        }

        @media (min-width: 768px) {
            .form-control {
                padding: 0.875rem 1rem 0.875rem 2.75rem;
                border-radius: 16px;
                font-size: 0.9375rem;
            }
        }

        .form-control:focus {
            border-color: #c45c26;
            box-shadow: 0 0 0 4px rgba(196, 92, 38, 0.1);
            outline: none;
            background: white;
        }

        .form-control.is-invalid {
            border-color: #dc2626;
        }

        .invalid-feedback {
            color: #dc2626;
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
        }

        @media (min-width: 768px) {
            .invalid-feedback {
                font-size: 0.75rem;
                margin-top: 0.375rem;
            }
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.375rem;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .password-toggle {
                right: 1rem;
                padding: 0.25rem;
            }
        }

        .password-toggle:hover {
            color: #0f172b;
        }

        .password-toggle i {
            font-size: 1rem;
        }

        @media (min-width: 768px) {
            .password-toggle i {
                font-size: 1.125rem;
            }
        }

        .password-strength {
            margin-top: 0.375rem;
        }

        .strength-bar {
            height: 3px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .strength-bar {
                height: 4px;
            }
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #22c55e; width: 100%; }

        .strength-text {
            font-size: 0.6875rem;
            margin-top: 0.25rem;
        }

        @media (min-width: 768px) {
            .strength-text {
                font-size: 0.75rem;
            }
        }

        .btn-auth {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #c45c26, #e8b86a);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 0.9375rem;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(196, 92, 38, 0.3);
            margin-top: 0.5rem;
        }

        @media (min-width: 768px) {
            .btn-auth {
                padding: 0.875rem;
                border-radius: 16px;
                font-size: 1rem;
            }
        }

        .btn-auth:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(196, 92, 38, 0.4);
        }

        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.25rem;
            color: #64748b;
            font-size: 0.8125rem;
        }

        @media (min-width: 768px) {
            .auth-footer {
                margin-top: 1.5rem;
                font-size: 0.875rem;
            }
        }

        .auth-footer a {
            color: #c45c26;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .spinner-border {
            display: none;
            width: 1rem;
            height: 1rem;
        }

        @media (min-width: 768px) {
            .spinner-border {
                width: 1.25rem;
                height: 1.25rem;
            }
        }

        .btn-auth:disabled .btn-text {
            display: none;
        }

        .btn-auth:disabled .spinner-border {
            display: inline-block;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1rem;
            margin-top: 0.5rem;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: #c45c26;
            cursor: pointer;
            margin-top: 0.125rem;
        }

        @media (min-width: 768px) {
            .checkbox-wrapper input[type="checkbox"] {
                width: 1.125rem;
                height: 1.125rem;
            }
        }

        .checkbox-wrapper label {
            font-size: 0.8125rem;
            color: #475569;
            cursor: pointer;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .checkbox-wrapper label {
                font-size: 0.875rem;
            }
        }

        .checkbox-wrapper a {
            color: #c45c26;
            text-decoration: none;
        }

        .alert-info-custom {
            background: #eff6ff;
            border: 1px solid #93c5fd;
            border-radius: 12px;
            padding: 0.625rem 0.875rem;
            margin-bottom: 1.25rem;
            font-size: 0.75rem;
            color: #1e40af;
        }

        @media (min-width: 768px) {
            .alert-info-custom {
                border-radius: 12px;
                padding: 0.75rem 1rem;
                margin-bottom: 1.5rem;
                font-size: 0.875rem;
            }
        }

        .alert-info-custom i {
            margin-right: 0.375rem;
            color: #3b82f6;
        }

        small.text-muted {
            font-size: 0.6875rem;
            display: block;
            margin-top: 0.25rem;
        }

        @media (min-width: 768px) {
            small.text-muted {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="brand-logo">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                <h2>Create Account</h2>
                <p>Join Liviel Tours Admin Panel</p>
            </div>

            <div class="alert-info-custom">
                <i class="bi bi-info-circle-fill"></i>
                <strong>Admin Registration:</strong> Create an account to access the admin panel.
            </div>

            <form id="registerForm" onsubmit="return false;">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label" for="fullName">
                        <i class="bi bi-person"></i> Full Name
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" class="form-control" id="fullName" name="full_name" 
                               placeholder="John Doe" required autocomplete="name">
                    </div>
                    <div class="invalid-feedback" id="fullNameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="bi bi-envelope"></i> Email Address
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="admin@example.com" required autocomplete="email">
                    </div>
                    <div class="invalid-feedback" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">
                        <i class="bi bi-phone"></i> Phone Number (Optional)
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-phone input-icon"></i>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               placeholder="+254700000000" autocomplete="tel">
                    </div>
                    <div class="invalid-feedback" id="phoneError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" class="password-toggle" data-target="password" tabindex="-1">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                    <div class="invalid-feedback" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">
                        <i class="bi bi-lock-fill"></i> Confirm Password
                    </label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input type="password" class="form-control" id="confirmPassword" name="confirm_password" 
                               placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" class="password-toggle" data-target="confirmPassword" tabindex="-1">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="confirmPasswordError"></div>
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-auth" id="registerBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner-border spinner-border-sm" role="status"></span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? 
                <a href="{% url 'app:login' %}">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            // Helper Functions
            function getCSRFToken() {
                const token = document.querySelector('[name=csrfmiddlewaretoken]');
                return token ? token.value : '';
            }

            function clearErrors() {
                document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
                document.querySelectorAll('.form-control').forEach(el => el.classList.remove('is-invalid'));
            }

            function showError(inputId, message) {
                const input = document.getElementById(inputId);
                const errorEl = document.getElementById(inputId + 'Error');
                if (input) input.classList.add('is-invalid');
                if (errorEl) errorEl.textContent = message;
            }

            function setLoading(button, isLoading) {
                if (isLoading) {
                    button.disabled = true;
                    const btnText = button.querySelector('.btn-text');
                    const spinner = button.querySelector('.spinner-border');
                    if (btnText) btnText.style.display = 'none';
                    if (spinner) spinner.style.display = 'inline-block';
                } else {
                    button.disabled = false;
                    const btnText = button.querySelector('.btn-text');
                    const spinner = button.querySelector('.spinner-border');
                    if (btnText) btnText.style.display = 'inline';
                    if (spinner) spinner.style.display = 'none';
                }
            }

            // Password Strength Checker
            function checkPasswordStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.match(/[a-z]+/)) strength++;
                if (password.match(/[A-Z]+/)) strength++;
                if (password.match(/[0-9]+/)) strength++;
                if (password.match(/[!@#$%^&*(),.?":{}|<>]+/)) strength++;
                
                const fill = document.getElementById('strengthFill');
                const text = document.getElementById('strengthText');
                
                if (!fill || !text) return;
                
                fill.className = 'strength-fill';
                if (strength <= 2) {
                    fill.classList.add('strength-weak');
                    text.textContent = 'Weak password';
                    text.style.color = '#ef4444';
                } else if (strength <= 4) {
                    fill.classList.add('strength-medium');
                    text.textContent = 'Medium password';
                    text.style.color = '#f59e0b';
                } else {
                    fill.classList.add('strength-strong');
                    text.textContent = 'Strong password';
                    text.style.color = '#22c55e';
                }
            }

            // Password Toggle
            document.querySelectorAll('.password-toggle').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const targetId = this.dataset.target;
                    const input = document.getElementById(targetId);
                    const icon = this.querySelector('i');
                    
                    if (input && icon) {
                        if (input.type === 'password') {
                            input.type = 'text';
                            icon.classList.remove('bi-eye-slash');
                            icon.classList.add('bi-eye');
                        } else {
                            input.type = 'password';
                            icon.classList.remove('bi-eye');
                            icon.classList.add('bi-eye-slash');
                        }
                    }
                });
            });

            // Password strength on input
            const passwordInput = document.getElementById('password');
            if (passwordInput) {
                passwordInput.addEventListener('input', function(e) {
                    checkPasswordStrength(e.target.value);
                });
            }

            // Phone number formatting (optional)
            const phoneInput = document.getElementById('phone');
            if (phoneInput) {
                phoneInput.addEventListener('input', function(e) {
                    let phone = e.target.value.replace(/\D/g, '');
                    if (phone.length > 15) phone = phone.slice(0, 15);
                    e.target.value = phone;
                });
            }

            // Registration Form Submit
            const registerForm = document.getElementById('registerForm');
            const registerBtn = document.getElementById('registerBtn');
            
            if (registerForm && registerBtn) {
                registerForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    clearErrors();
                    
                    const fullName = document.getElementById('fullName').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    const agreeTerms = document.getElementById('agreeTerms').checked;
                    
                    // Validation
                    let hasError = false;
                    
                    if (!fullName) {
                        showError('fullName', 'Full name is required');
                        hasError = true;
                    }
                    
                    if (!email) {
                        showError('email', 'Email is required');
                        hasError = true;
                    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                        showError('email', 'Please enter a valid email address');
                        hasError = true;
                    }
                    
                    if (password.length < 8) {
                        showError('password', 'Password must be at least 8 characters');
                        hasError = true;
                    }
                    
                    if (password !== confirmPassword) {
                        showError('confirmPassword', 'Passwords do not match');
                        hasError = true;
                    }
                    
                    if (!agreeTerms) {
                        Swal.fire({
                            title: 'Terms Required',
                            text: 'Please agree to the Terms of Service and Privacy Policy',
                            icon: 'warning',
                            confirmButtonColor: '#c45c26'
                        });
                        hasError = true;
                    }
                    
                    if (hasError) return;
                    
                    const cleanPhone = phone ? phone.replace(/\D/g, '') : '';
                    
                    setLoading(registerBtn, true);
                    
                    try {
                        const response = await fetch('/api/auth/register/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': getCSRFToken()
                            },
                            body: JSON.stringify({
                                full_name: fullName,
                                email: email,
                                phone: cleanPhone,
                                password: password,
                                confirm_password: confirmPassword
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            Swal.fire({
                                title: 'Registration Successful!',
                                text: 'Your account has been created. You can now sign in.',
                                icon: 'success',
                                confirmButtonColor: '#c45c26'
                            }).then(() => {
                                window.location.href = "{% url 'app:login' %}";
                            });
                        } else {
                            Swal.fire({
                                title: 'Registration Failed',
                                text: data.error || 'An error occurred',
                                icon: 'error',
                                confirmButtonColor: '#c45c26'
                            });
                        }
                    } catch (error) {
                        console.error('Registration error:', error);
                        Swal.fire({
                            title: 'Error',
                            text: 'Network error. Please try again.',
                            icon: 'error',
                            confirmButtonColor: '#c45c26'
                        });
                    } finally {
                        setLoading(registerBtn, false);
                    }
                });
            }

            // Auto-focus first input
            const fullNameInput = document.getElementById('fullName');
            if (fullNameInput) {
                fullNameInput.focus();
            }
        })();
    </script>
</body>
</html>
